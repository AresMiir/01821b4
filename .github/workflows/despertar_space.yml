name: Mantener Space Vivo

on:
  schedule:
    - cron: '0 12 * * *'  # Se ejecuta a las 12:00 UTC
  workflow_dispatch:      # Permite ejecución manual

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Enviar señal de reinicio al Space
        run: |
          # REEMPLAZA 'tu-usuario' y 'tu-space' con tus datos reales
          curl -X POST https://huggingface.co/api/spaces/aresmiiir/proxy/restart \
          -H "Authorization: Bearer ${{ secrets.HF_TOKEN }}"
