name: Mantener Space Vivo

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

permissions:
  contents: write  # Permite al script hacer commits

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Enviar señal de reinicio al Space
        run: |
          curl -f -X POST https://huggingface.co/api/spaces/aresmiiir/proxy/restart \
          -H "Authorization: Bearer ${{ secrets.HF_TOKEN }}"

      - name: Auto-commit vacío (Keepalive)
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git commit --allow-empty -m "Keepalive: evitando suspensión de Actions"
          git push

